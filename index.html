<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sOuLREADER - All-in-One Document Suite</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    
    <!-- External Libraries (CDNs) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --light: #f8fafc;
            --accent: #10b981;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --bg-glass: rgba(15, 23, 42, 0.8);
            --sidebar-width: 320px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: #020617;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary); }

        /* Header */
        header {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 1rem; }
        .logo { 
            font-size: 1.25rem; 
            font-weight: 800; 
            background: linear-gradient(to right, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex; 
            align-items: center; 
            gap: 0.75rem; 
        }
        .logo img { height: 32px; filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.5)); }
        
        #file-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            max-width: 40%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .sidebar-toggle-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border-color);
            color: white; 
            font-size: 1.2rem; 
            cursor: pointer; 
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .sidebar-toggle-btn:hover { background: var(--primary); border-color: var(--primary); transform: scale(1.05); }

        /* Main Layout */
        main { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* Sidebar */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1100;
        }
        
        @media (max-width: 1024px) {
            #sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: 280px;
            }
            #sidebar.visible { transform: translateX(0); box-shadow: 20px 0 60px rgba(0,0,0,0.8); }
        }

        .sidebar-header { 
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h3 { margin: 0; font-size: 1.1rem; font-weight: 600; }
        .close-sidebar-btn { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; display: none; }
        @media (max-width: 1024px) { .close-sidebar-btn { display: block; } }

        .tabs { display: flex; padding: 0.5rem; gap: 0.5rem; background: rgba(0,0,0,0.2); margin: 0 1rem 1rem; border-radius: 12px; }
        .tab { 
            flex: 1; 
            padding: 8px; 
            text-align: center; 
            cursor: pointer; 
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s;
            color: var(--text-muted);
        }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        .file-list { flex: 1; overflow-y: auto; padding: 0 1rem 1rem; }
        .file-item { 
            padding: 0.75rem 1rem; 
            margin-bottom: 0.5rem; 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            font-size: 0.85rem; 
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            transition: all 0.2s;
            color: var(--text-muted);
        }
        .file-item:hover { background: rgba(255,255,255,0.08); color: white; border-color: var(--border-color); }
        .file-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-color: transparent; }
        .file-item i { margin-right: 12px; font-size: 1.1rem; width: 20px; text-align: center; }
        .file-item.active i { color: white !important; }
        .file-item span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Viewer */
        #viewer-container { flex: 1; background: #020617; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        #viewer-content { width: 100%; height: 100%; border: none; overflow: auto; scroll-behavior: smooth; }
        
        /* Reading Progress Bar */
        #reading-progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.05);
            z-index: 100;
        }
        #reading-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.1s;
        }

        #progress-overlay { 
            position: absolute; 
            bottom: 20px; 
            right: 20px; 
            background: rgba(99, 102, 241, 0.9); 
            backdrop-filter: blur(10px);
            color: white; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 700;
            pointer-events: none; 
            opacity: 0; 
            transform: translateY(10px);
            transition: all 0.3s; 
            z-index: 50; 
        }
        #progress-overlay.visible { opacity: 1; transform: translateY(0); }

        .upload-section { padding: 1.5rem; border-top: 1px solid var(--border-color); }
        .upload-btn { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            color: white; 
            padding: 12px; 
            width: 100%; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
        }
        .upload-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4); }

        /* Document Renders */
        .content-text-wrapper { 
            padding: 40px 20px; 
            line-height: 1.8; 
            max-width: 800px; 
            margin: 0 auto; 
            color: #cbd5e1;
            font-size: 1.1rem;
        }
        .pdf-viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1e293b;
            padding: 20px 0;
            gap: 20px;
            width: 100%;
        }
        .pdf-page-canvas {
            max-width: 100%;
            height: auto !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: white;
            image-rendering: high-quality;
        }
        
        /* Iframe handling for Office Docs */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .code-wrapper pre { 
            margin: 20px; padding: 24px; background: #0f172a !important; border-radius: 16px; border: 1px solid var(--border-color);
            font-family: 'Fira Code', monospace; font-size: 0.95rem;
        }
        
        .img-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100%; padding: 40px; }
        .img-wrapper img { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        .media-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; gap: 30px; padding: 40px; }
        .media-wrapper video { width: 100%; max-width: 900px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        .welcome-screen { 
            height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem;
            background: radial-gradient(circle at center, rgba(99,102,241,0.05) 0%, transparent 70%);
        }
        .welcome-screen i { font-size: 5rem; margin-bottom: 2rem; background: linear-gradient(to bottom, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0.5; }
        .welcome-screen h2 { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; color: white; }
        .welcome-screen p { color: var(--text-muted); max-width: 450px; line-height: 1.6; }

        .delete-local-file-btn { 
            color: #f43f5e; opacity: 0.4; transition: 0.2s; background: none; border: none; padding: 8px; cursor: pointer;
            border-radius: 6px;
        }
        .delete-local-file-btn:hover { opacity: 1; transform: scale(1.1); background: rgba(244, 63, 94, 0.1); }
        .file-item.active .delete-local-file-btn { color: white; opacity: 0.8; }
        .file-item.active .delete-local-file-btn:hover { background: rgba(255,255,255,0.2); }

        .clear-all-local-btn {
            background: rgba(244, 63, 94, 0.1);
            color: #fb7185;
            border: 1px solid rgba(244, 63, 94, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .clear-all-local-btn:hover {
            background: #f43f5e;
            color: white;
            border-color: #f43f5e;
        }

        #loader { 
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; 
            background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s; 
        }
        #loader.show { opacity: 1; pointer-events: auto; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(99, 102, 241, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive Mobile Drawer Logic is handled in JS toggle */
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="sidebar-toggle-btn" id="sidebar-toggle-btn"><i class="fas fa-bars-staggered"></i></button>
            <div class="logo">
                <img src="logo.svg" alt="sOuLREADER Logo">
                sOuLREADER
            </div>
        </div>
        <div id="file-title">No document active</div>
    </header>

    <main>
        <div id="reading-progress-container">
            <div id="reading-progress-bar"></div>
        </div>

        <section id="sidebar">
            <div class="sidebar-header">
                <h3>Library</h3>
                <button class="close-sidebar-btn" id="close-sidebar-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="tabs">
                <div class="tab active" data-tab="cloud" onclick="switchTab('cloud')">Repository</div>
                <div class="tab" data-tab="local" onclick="switchTab('local')">Uploads</div>
            </div>
            <div id="file-list-cloud" class="file-list"></div>
            <div id="file-list-local" class="file-list" style="display:none"></div>
            
            <div class="upload-section">
                <label for="file-input" class="upload-btn">
                    <i class="fas fa-plus-circle"></i> New Document
                </label>
                <input type="file" id="file-input" multiple onchange="handleFileUpload(event)" style="display:none">
            </div>
        </section>

        <section id="viewer-container">
            <div id="loader"><div class="spinner"></div></div>
            <div id="progress-overlay">0% Complete</div>
            <div id="viewer-content">
                <div class="welcome-screen">
                    <i class="fas fa-book-open"></i>
                    <h2>Reading perfected.</h2>
                    <p>Access your professional documents from GitHub or upload local files. Your progress is synced automatically to this browser.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const REPO_API_DOCUMENTS = "https://api.github.com/repos/sOuL2000s/sOuLREADER/contents/documents";
        const viewerContent = document.getElementById('viewer-content');
        const fileTitle = document.getElementById('file-title');
        const progressOverlay = document.getElementById('progress-overlay');
        let currentFilePath = "";
        let currentActiveFileItem = null;

        window.onload = () => {
            fetchCloudFiles();
            loadLocalLibrary();
            
            viewerContent.addEventListener('scroll', () => {
                if(!currentFilePath) return;
                
                const totalHeight = viewerContent.scrollHeight - viewerContent.clientHeight;
                
                // Special handling for single-page or iframe-based content where scrollHeight might not be captured
                if (totalHeight <= 5) {
                    const progressBar = document.getElementById('reading-progress-bar');
                    progressBar.style.width = '100%';
                    progressOverlay.innerText = `100% Complete`;
                    return;
                }
                
                const progress = (viewerContent.scrollTop / totalHeight) * 100;
                const roundedProgress = Math.min(Math.round(progress), 100);
                
                const progressBar = document.getElementById('reading-progress-bar');
                progressBar.style.width = `${roundedProgress}%`;
                
                progressOverlay.innerText = `${roundedProgress}% Complete`;
                progressOverlay.classList.add('visible');
                
                saveProgress(currentFilePath, viewerContent.scrollTop);
                
                clearTimeout(window.scrollTimeout);
                window.scrollTimeout = setTimeout(() => {
                    progressOverlay.classList.remove('visible');
                }, 2000);
            });
            
            setupSidebarEvents();
        };

        function toggleSidebar(show) {
            const sb = document.getElementById('sidebar');
            if (show) sb.classList.add('visible');
            else sb.classList.remove('visible');
        }

        function setupSidebarEvents() {
            document.getElementById('sidebar-toggle-btn').onclick = (e) => {
                e.stopPropagation();
                toggleSidebar(true);
            };
            document.getElementById('close-sidebar-btn').onclick = (e) => {
                e.stopPropagation();
                toggleSidebar(false);
            };
            
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 1024) {
                    const sb = document.getElementById('sidebar');
                    const toggleBtn = document.getElementById('sidebar-toggle-btn');
                    if (sb.classList.contains('visible') && !sb.contains(e.target) && !toggleBtn.contains(e.target)) {
                        toggleSidebar(false);
                    }
                }
            });
        }

        async function fetchCloudFiles() {
            try {
                const response = await fetch(REPO_API_DOCUMENTS);
                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status} ${response.statusText}`);
                }
                const files = await response.json();
                const container = document.getElementById('file-list-cloud');
                container.innerHTML = '';
                
                // Sort files alphabetically by name
                files.sort((a, b) => a.name.localeCompare(b.name));

                files.forEach(file => {
                    if(file.type === 'file') { // Only display files, not directories
                        container.appendChild(createFileItem(file.name, file.download_url, true));
                    }
                });
                if (files.length === 0) {
                    container.innerHTML = "<p style='padding:10px; text-align:center; color:#64748b;'>No documents found in the repository.</p>";
                }
            } catch (e) {
                console.error("Failed to load cloud files:", e);
                document.getElementById('file-list-cloud').innerHTML = `<p style='padding:10px; text-align:center; color:#ef4444;'>Failed to load cloud files: ${e.message}</p>`;
            }
        }

        function createFileItem(name, url, isCloud) {
            const ext = name.split('.').pop().toLowerCase();
            const div = document.createElement('div');
            div.className = 'file-item';
            div.dataset.fileName = name; // Store filename for deletion
            
            let itemContent = `<i class="${getIcon(ext)}"></i> <span>${name}</span>`;
            if (!isCloud) {
                itemContent += `<button class="delete-local-file-btn" title="Delete from local storage"><i class="fas fa-times-circle"></i></button>`;
            }
            div.innerHTML = itemContent;

            div.onclick = (event) => {
                // Prevent opening file if delete button was clicked
                if (event.target.closest('.delete-local-file-btn')) {
                    deleteLocalFile(name);
                    return;
                }
                if (currentActiveFileItem) currentActiveFileItem.classList.remove('active');
                div.classList.add('active');
                currentActiveFileItem = div;
                openFile(url, name, ext, isCloud);
                if (window.innerWidth <= 768) toggleSidebar(false);
            };
            return div;
        }

        function handleFileUpload(event) {
            const files = event.target.files;
            let localData = JSON.parse(localStorage.getItem('local_files') || '[]');
            
            // Convert FileList to Array and filter out duplicates
            const newFiles = Array.from(files).filter(file => !localData.some(existingFile => existingFile.name === file.name));

            if (newFiles.length === 0 && files.length > 0) {
                alert("One or more selected files already exist in 'My Uploads'.");
                return;
            }

            let filesProcessed = 0;
            const totalFiles = newFiles.length;

            if (totalFiles === 0) return;

            // Show a temporary loading indicator or progress
            const uploadBtn = document.querySelector('.upload-btn');
            const originalBtnText = uploadBtn.innerHTML;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            uploadBtn.disabled = true;

            newFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localData.push({ name: file.name, data: e.target.result, type: file.type, lastRead: Date.now() });
                    filesProcessed++;

                    if (filesProcessed === totalFiles) {
                        localStorage.setItem('local_files', JSON.stringify(localData));
                        loadLocalLibrary();
                        uploadBtn.innerHTML = originalBtnText;
                        uploadBtn.disabled = false;
                        document.getElementById('file-input').value = ''; // Clear file input
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function loadLocalLibrary() {
            const container = document.getElementById('file-list-local');
            container.innerHTML = '';
            let localFiles = JSON.parse(localStorage.getItem('local_files') || '[]');
            
            if (localFiles.length === 0) {
                container.innerHTML = "<p style='padding:10px; text-align:center; color:#64748b;'>No local files uploaded yet.</p>";
            } else {
                // Sort local files by lastRead date (newest first)
                localFiles.sort((a, b) => b.lastRead - a.lastRead);
                localFiles.forEach(file => {
                    container.appendChild(createFileItem(file.name, file.data, false));
                });
            }
            addLocalLibraryControls(container, localFiles.length > 0);
        }

        function addLocalLibraryControls(container, hasFiles) {
            let controlsDiv = container.querySelector('.local-controls');
            if (!controlsDiv) {
                controlsDiv = document.createElement('div');
                controlsDiv.className = 'local-controls';
                controlsDiv.style.padding = '10px';
                controlsDiv.style.borderTop = '1px solid var(--border-color)';
                controlsDiv.style.marginTop = '10px';
                controlsDiv.style.display = 'flex';
                controlsDiv.style.justifyContent = 'center';
                container.appendChild(controlsDiv);
            }
            controlsDiv.innerHTML = ''; // Clear previous controls
            
            if (hasFiles) {
                const clearAllBtn = document.createElement('button');
                clearAllBtn.className = 'clear-all-local-btn';
                clearAllBtn.innerHTML = '<i class="fas fa-trash-alt"></i> Clear All My Uploads';
                clearAllBtn.onclick = clearAllLocalFiles;
                controlsDiv.appendChild(clearAllBtn);
            }
        }

        function deleteLocalFile(fileName) {
            if (!confirm(`Are you sure you want to delete "${fileName}" from your local uploads?`)) {
                return;
            }

            let localData = JSON.parse(localStorage.getItem('local_files') || '[]');
            const updatedLocalData = localData.filter(file => file.name !== fileName);
            localStorage.setItem('local_files', JSON.stringify(updatedLocalData));
            
            loadLocalLibrary(); 
            
            if (currentFilePath === fileName) {
                resetViewer();
            }
        }

        function resetViewer() {
            viewerContent.innerHTML = `
                <div class="welcome-screen">
                    <i class="fas fa-book-open"></i>
                    <h2>Reading perfected.</h2>
                    <p>Access your professional documents from GitHub or upload local files. Your progress is synced automatically to this browser.</p>
                </div>`;
            fileTitle.innerText = "No document active";
            currentFilePath = "";
            if (currentActiveFileItem) currentActiveFileItem.classList.remove('active');
            currentActiveFileItem = null;
            document.getElementById('reading-progress-bar').style.width = '0%';
        }

        function clearAllLocalFiles() {
            if (!confirm('Are you sure you want to delete ALL your uploaded files? This action cannot be undone.')) {
                return;
            }
            localStorage.removeItem('local_files');
            for (let i = localStorage.length - 1; i >= 0; i--) {
                const key = localStorage.key(i);
                if (key.startsWith('progress_')) localStorage.removeItem(key);
            }
            loadLocalLibrary();
            resetViewer();
        }

        async function renderPDF(url) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
            
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const container = document.createElement('div');
                container.className = 'pdf-viewer-container';
                viewerContent.appendChild(container);

                // Determine scale based on device for better zoom quality
                const scale = window.devicePixelRatio > 1 ? 2.0 : 1.5;

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: scale });
                    
                    const canvas = document.createElement('canvas');
                    canvas.className = 'pdf-page-canvas';
                    const context = canvas.getContext('2d');
                    
                    // Set display size
                    canvas.style.width = '100%';
                    canvas.style.maxWidth = `${viewport.width / scale}px`;
                    
                    // Set actual render size
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport,
                        intent: 'display'
                    };
                    
                    container.appendChild(canvas);
                    await page.render(renderContext).promise;
                }
                return true;
            } catch (error) {
                console.error('PDF rendering failed:', error);
                throw new Error("Failed to render PDF. It might be corrupted or inaccessible.");
            }
        }

        function openFile(url, name, ext, isCloud) {
            currentFilePath = name;
            fileTitle.innerText = name;
            viewerContent.innerHTML = '';
            document.getElementById('reading-progress-bar').style.width = '0%';
            document.getElementById('loader').classList.add('show');

            const textExts = ['txt', 'rtf', 'csv', 'tsv', 'tex', 'msg', 'json', 'xml', 'yaml', 'yml', 'sql', 'ini', 'conf', 'env'];
            const codeExts = ['html', 'htm', 'css', 'scss', 'js', 'jsx', 'ts', 'tsx', 'php', 'asp', 'c', 'cpp', 'h', 'hpp', 'java', 'py', 'rb', 'go', 'rs', 'swift', 'kt', 'sh', 'bat', 'cmd', 'com']; 
            const imgExts = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'tiff', 'webp', 'heic', 'ico'];
            const videoExts = ['mp4', 'mkv', 'avi', 'mov', 'wmv', 'flv', 'webm', 'm4v', '3gp', 'mpeg', 'mpg'];
            const audioExts = ['mp3', 'aac', 'ogg', 'm4a', 'wma', 'opus', 'wav', 'flac', 'alac', 'aiff'];
            const officeExts = ['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'ods', 'odt', 'odp', 'wpd', 'pages', 'numbers', 'xlsm', 'key', 'pps', 'ppsx'];

            setTimeout(async () => {
                try {
                    if (ext === 'pdf') {
                        await renderPDF(url);
                    } 
                    else if (ext === 'md') {
                        const resp = await (isCloud ? fetch(url) : Promise.resolve({text: () => Promise.resolve(atob(url.split(',')[1]))}));
                        viewerContent.innerHTML = `<div class="content-text-wrapper">${marked.parse(await resp.text())}</div>`;
                    }
                    else if (imgExts.includes(ext) || ext === 'svg') {
                        viewerContent.innerHTML = `<div class="img-wrapper"><img src="${url}"></div>`;
                    }
                    else if (videoExts.includes(ext)) {
                        viewerContent.innerHTML = `<div class="media-wrapper"><video controls autoplay style="max-width:100%"><source src="${url}"></video></div>`;
                    }
                    else if (audioExts.includes(ext)) {
                        viewerContent.innerHTML = `<div class="media-wrapper"><i class="fas fa-music fa-4x" style="color:var(--primary)"></i><br><audio controls autoplay><source src="${url}"></audio></div>`;
                    }
                    else if (ext === 'epub') {
                        viewerContent.innerHTML = `<div id="epub-viewer" style="height:100%"></div>`;
                        const rendition = ePub(url).renderTo("epub-viewer", { width: "100%", height: "100%" });
                        rendition.display();
                    }
                    else if (textExts.includes(ext) || codeExts.includes(ext)) {
                        const resp = await (isCloud ? fetch(url) : Promise.resolve({text: () => Promise.resolve(atob(url.split(',')[1]))}));
                        const rawText = await resp.text();
                        const txt = rawText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        viewerContent.innerHTML = `<div class="code-wrapper"><pre><code class="language-${ext}">${txt}</code></pre></div>`;
                        Prism.highlightAllUnder(viewerContent);
                    }
                    else if (officeExts.includes(ext)) {
                        if (isCloud) {
                            // We wrap the iframe in a container that allows for better mobile scrolling 
                            // Note: Real scroll tracking inside cross-origin iframes is restricted by browsers.
                            // To allow progress tracking, we set the height of the container.
                            viewerContent.innerHTML = `
                                <div class="iframe-wrapper">
                                    <iframe src="https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true" 
                                            allowfullscreen 
                                            webkitallowfullscreen 
                                            mozallowfullscreen>
                                    </iframe>
                                </div>`;
                        } else {
                            throw new Error("Local Office document viewing requires cloud conversion. Please use Cloud storage for .doc/.xls files.");
                        }
                    }
                    else {
                        throw new Error(`The format .${ext} is not supported for instant viewing.`);
                    }
                    
                    // Restore scroll position
                    const savedPos = localStorage.getItem(`progress_${name}`);
                    if (savedPos) {
                        setTimeout(() => viewerContent.scrollTop = savedPos, 50);
                    }
                } catch (err) {
                    viewerContent.innerHTML = `
                        <div class="welcome-screen" style="background:none">
                            <i class="fas fa-exclamation-circle" style="color:#f43f5e"></i>
                            <h3>Unable to view document</h3>
                            <p>${err.message}</p>
                            <a href="${url}" download="${name}" class="upload-btn" style="width:auto; margin-top:20px; padding: 10px 25px;">
                                <i class="fas fa-download"></i> Download Original
                            </a>
                        </div>`;
                }
                document.getElementById('loader').classList.remove('show');
            }, 100);
        }

        function getIcon(ext) {
            const map = {
                pdf:'pdf', doc:'word', docx:'word', odt:'word', wpd:'word', pages:'word',
                xls:'excel', xlsx:'excel', ods:'excel', numbers:'excel', csv:'csv',
                ppt:'powerpoint', pptx:'powerpoint', odp:'powerpoint', key:'powerpoint',
                epub:'book', mobi:'book', azw3:'book', djvu:'book',
                mp3:'audio', aac:'audio', ogg:'audio', wav:'audio', flac:'audio',
                mp4:'video', mkv:'video', avi:'video', mov:'video', webm:'video',
                zip:'zipper', rar:'zipper', '7z':'zipper', tar:'zipper', gz:'zipper',
                js:'code', jsx:'code', ts:'code', tsx:'code', html:'code', css:'code', py:'code',
                json:'file-code', xml:'file-code', yaml:'file-code', sql:'database',
                jpg:'image', jpeg:'image', png:'image', gif:'image', webp:'image', svg:'bezier-curve',
                md: 'lines-leaping'
            };
            return `fas fa-file-${map[ext] || 'lines'}`;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.getAttribute('data-tab') === tab);
            });
            document.getElementById('file-list-cloud').style.display = tab === 'cloud' ? 'block' : 'none';
            document.getElementById('file-list-local').style.display = tab === 'local' ? 'block' : 'none';
        }

        function saveProgress(name, pos) { localStorage.setItem(`progress_${name}`, pos); }
    </script>
</body>
