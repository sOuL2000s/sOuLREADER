<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sOuLREADER - All-in-One Document Suite</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    
    <!-- External Libraries (CDNs) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
            --accent: #3b82f6;
            --text-color: #334155;
            --border-color: #e2e8f0;
            --bg-secondary: #f1f5f9;
            --shadow-light: rgba(0,0,0,0.05);
            --shadow-medium: rgba(0,0,0,0.1);
            --sidebar-width: 300px;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: var(--light);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: var(--text-color);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Header */
        header {
            background: var(--dark);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px var(--shadow-medium);
            position: relative;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 0.5rem; }
        .sidebar-toggle-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; display: none; padding: 0.5rem; border-radius: 5px; transition: background 0.2s; }
        .sidebar-toggle-btn:hover { background: rgba(255, 255, 255, 0.1); }

        /* Main Layout */
        main { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        #sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px var(--shadow-light);
            transition: transform 0.3s ease-in-out;
            position: relative;
            flex-shrink: 0;
        }
        #sidebar.hidden { transform: translateX(-100%); position: absolute; height: 100%; z-index: 200; }
        #sidebar .sidebar-header { display: none; justify-content: flex-end; padding: 0.5rem 1rem 0; }
        #sidebar .close-sidebar-btn { background: none; border: none; color: var(--dark); font-size: 1.5rem; cursor: pointer; padding: 0.5rem; border-radius: 5px; }

        .tabs { display: flex; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); }
        .tabs .tab { flex: 1; padding: 12px 10px; text-align: center; cursor: pointer; border-bottom: 2px solid transparent; font-weight: 500; transition: all 0.2s; }
        .tab.active { border-bottom: 2px solid var(--primary); font-weight: 600; background: white; color: var(--primary); }

        .file-list { flex: 1; overflow-y: auto; padding: 10px; }
        .file-item { padding: 10px; margin-bottom: 4px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; font-size: 0.9rem; transition: background 0.2s; }
        .file-item:hover { background: var(--bg-secondary); }
        .file-item.active { background: var(--primary); color: white; }
        .file-item.active i { color: white; }
        .file-item i { margin-right: 10px; color: #64748b; font-size: 1.1em; }

        /* Viewer */
        #viewer-container { flex: 1; background: var(--bg-secondary); position: relative; display: flex; flex-direction: column; overflow: hidden; }
        #viewer-content { width: 100%; height: 100%; border: none; background: white; overflow: auto; padding: 20px; box-sizing: border-box; }
        #viewer-content iframe, #viewer-content .img-wrapper, #viewer-content .media-wrapper, #viewer-content #epub-viewer { padding: 0; }

        #progress-overlay { position: fixed; top: 10px; right: 20px; background: var(--dark); color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 50; }
        #progress-overlay.visible { opacity: 1; }

        .upload-section { padding: 15px; border-top: 1px solid var(--border-color); }
        #file-input { display: none; }
        .upload-btn { background: var(--primary); color: white; padding: 10px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: 500; display: flex; justify-content: center; align-items: center; gap: 10px; }

        .code-wrapper pre { 
            padding: 20px; 
            margin: 0; 
            background: #2d2d2d; 
            color: #ccc; 
            font-size: 0.9em; 
            border-radius: 8px; 
            overflow-x: auto; 
            line-height: 1.5;
            white-space: pre-wrap; /* Ensure code wraps within the viewer */
            word-break: break-all;
        }
        .content-text-wrapper { 
            padding: 20px; 
            line-height: 1.6; 
            max-width: 800px; /* Constrain width for readability */
            margin: 0 auto;
            word-wrap: break-word; /* Ensure text wraps */
        }
        .content-text-wrapper h1, .content-text-wrapper h2, .content-text-wrapper h3 {
            color: var(--dark);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.3em;
        }
        .content-text-wrapper p { margin-bottom: 1em; }
        .content-text-wrapper ul, .content-text-wrapper ol { margin-left: 20px; margin-bottom: 1em; }


        .img-wrapper { display: flex; justify-content: center; align-items: center; height: 100%; background: var(--bg-secondary); overflow: auto; padding: 20px; box-sizing: border-box; }
        .img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 5px 15px var(--shadow-medium); border-radius: 8px; }
        .media-wrapper { display: flex; justify-content: center; align-items: center; height: 100%; flex-direction: column; gap: 20px; background: var(--bg-secondary); padding: 20px; box-sizing: border-box; }
        .media-wrapper video, .media-wrapper audio { max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 5px 15px var(--shadow-medium); }
        .unsupported, .welcome-screen { 
            padding: 50px 20px; 
            text-align: center; 
            color: var(--text-color); 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: white; /* Ensure background is white for main content */
        }
        .unsupported a { color: var(--primary); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .unsupported a:hover { color: var(--accent); }
        .welcome-screen h2, .unsupported h3 { color: var(--dark); margin-bottom: 10px; }
        .welcome-screen p, .unsupported p { max-width: 500px; line-height: 1.5; }


        #loader { position: absolute; top: 0; left: 0; display: flex; justify-content: center; align-items: center; background: rgba(255, 255, 255, 0.8); width: 100%; height: 100%; z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s ease-in-out; }
        #loader.show { opacity: 1; pointer-events: auto; }
        #loader i { color: var(--primary); }

        /* File Item Styling for Delete Button */
        .file-item { 
            padding: 10px; 
            margin-bottom: 4px; 
            border-radius: 5px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            font-size: 0.9rem; 
            transition: background 0.2s, color 0.2s; 
            position: relative; /* For delete button positioning */
        }
        .file-item:hover { background: var(--bg-secondary); }
        .file-item.active { background: var(--primary); color: white; }
        .file-item.active i.fas { color: white; }
        .file-item i.fas { margin-right: 10px; color: #64748b; font-size: 1.1em; }
        .file-item span { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .delete-local-file-btn {
            background: none;
            border: none;
            color: #ef4444; /* Red color for delete icon */
            font-size: 1.2em;
            cursor: pointer;
            margin-left: 10px;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0; /* Prevent icon from shrinking */
        }
        .delete-local-file-btn:hover {
            background: rgba(239, 68, 68, 0.1); /* Lighter red hover background */
            color: #dc2626; /* Darker red on hover */
        }
        .file-item.active .delete-local-file-btn {
            color: white; /* White icon when parent is active */
        }
        .file-item.active .delete-local-file-btn:hover {
            background: rgba(255, 255, 255, 0.2); /* White translucent hover when parent is active */
        }

        /* Clear All Local Files Button */
        .clear-all-local-btn {
            background: #ef4444;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: background 0.2s;
            width: 100%;
        }
        .clear-all-local-btn:hover {
            background: #dc2626;
        }

        /* Media Queries for Responsiveness */
        @media (max-width: 768px) {
            .sidebar-toggle-btn { display: block; }
            #sidebar { 
                position: fixed; 
                top: 0; 
                left: 0; 
                width: 80%; 
                height: 100%; 
                z-index: 200; 
                box-shadow: 5px 0 15px var(--shadow-medium); 
                transform: translateX(-100%); /* Start hidden on mobile */
            }
            #sidebar.hidden { transform: translateX(-100%); }
            #sidebar.visible { transform: translateX(0%); } /* Use 'visible' class to show */
            #sidebar .sidebar-header { display: flex; justify-content: flex-end; padding: 0.5rem 1rem 0; }
            main { flex-direction: column; }
            header { padding: 0.8rem 1rem; }
            .logo { font-size: 1.3rem; }
            .upload-btn { font-size: 0.9rem; padding: 8px; }
            .file-item { font-size: 0.85rem; padding: 8px; }
            .content-text-wrapper { padding: 15px; }
            .code-wrapper pre { padding: 15px; font-size: 0.8em; }
            .img-wrapper, .media-wrapper { padding: 15px; }
            .unsupported, .welcome-screen { padding: 30px 15px; }
            .unsupported h3, .welcome-screen h2 { font-size: 1.3em; }
            .unsupported p, .welcome-screen p { font-size: 0.9em; }
        }

        @media (min-width: 769px) {
            #sidebar { transform: translateX(0%); position: relative; } /* Always visible on desktop */
            #sidebar.hidden { transform: translateX(0%); } /* Override hidden for desktop */
        }

        @media (max-width: 768px) {
            .sidebar-toggle-btn { display: block; }
            #sidebar { position: fixed; top: 0; left: 0; width: 80%; height: 100%; z-index: 200; box-shadow: 5px 0 15px var(--shadow-medium); }
            #sidebar .sidebar-header { display: flex; }
            main { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="sidebar-toggle-btn" id="sidebar-toggle-btn"><i class="fas fa-bars"></i></button>
            <div class="logo">
                <img src="logo.svg" alt="sOuLREADER Logo" style="height: 30px; vertical-align: middle;">
                sOuLREADER
            </div>
        </div>
        <div id="file-title">Select a document to begin</div>
    </header>

    <main>
        <section id="sidebar">
            <div class="sidebar-header">
                <button class="close-sidebar-btn" id="close-sidebar-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('cloud')">Cloud</div>
                <div class="tab" onclick="switchTab('local')">My Uploads</div>
            </div>
            <div id="file-list-cloud" class="file-list"></div>
            <div id="file-list-local" class="file-list" style="display:none">
                <!-- Local files will be loaded here -->
            </div>
            <div class="upload-section">
                <label for="file-input" class="upload-btn">
                    <i class="fas fa-upload"></i> Upload Document
                </label>
                <input type="file" id="file-input" multiple onchange="handleFileUpload(event)">
            </div>
        </section>

        <section id="viewer-container">
            <div id="loader"><i class="fas fa-spinner fa-spin fa-3x"></i></div>
            <div id="progress-overlay">Progress: 0%</div>
            <div id="viewer-content">
                <div class="welcome-screen">
                    <i class="fas fa-file-import fa-5x" style="color: var(--border-color); margin-bottom: 20px;"></i>
                    <h2>Welcome to sOuLREADER</h2>
                    <p>Select a file from the repository or upload one from your device.</p>
                    <p>Organize, read, and delete your documents with ease.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const REPO_API_DOCUMENTS = "https://api.github.com/repos/sOuL2000s/sOuLREADER/contents/documents";
        const viewerContent = document.getElementById('viewer-content');
        const fileTitle = document.getElementById('file-title');
        const progressOverlay = document.getElementById('progress-overlay');
        let currentFilePath = "";
        let currentActiveFileItem = null;

        window.onload = () => {
            fetchCloudFiles();
            loadLocalLibrary();
            viewerContent.onscroll = function() {
                if(!currentFilePath) return;
                const progress = (viewerContent.scrollTop / (viewerContent.scrollHeight - viewerContent.clientHeight)) * 100;
                progressOverlay.innerText = `Progress: ${Math.round(progress)}%`;
                saveProgress(currentFilePath, viewerContent.scrollTop);
                progressOverlay.classList.add('visible');
                clearTimeout(this.scrollTimeout);
                this.scrollTimeout = setTimeout(() => progressOverlay.classList.remove('visible'), 1500);
            };
            setupSidebarToggles();
        };

        async function fetchCloudFiles() {
            try {
                const response = await fetch(REPO_API_DOCUMENTS);
                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status} ${response.statusText}`);
                }
                const files = await response.json();
                const container = document.getElementById('file-list-cloud');
                container.innerHTML = '';
                
                // Sort files alphabetically by name
                files.sort((a, b) => a.name.localeCompare(b.name));

                files.forEach(file => {
                    if(file.type === 'file') { // Only display files, not directories
                        container.appendChild(createFileItem(file.name, file.download_url, true));
                    }
                });
                if (files.length === 0) {
                    container.innerHTML = "<p style='padding:10px; text-align:center; color:#64748b;'>No documents found in the repository.</p>";
                }
            } catch (e) {
                console.error("Failed to load cloud files:", e);
                document.getElementById('file-list-cloud').innerHTML = `<p style='padding:10px; text-align:center; color:#ef4444;'>Failed to load cloud files: ${e.message}</p>`;
            }
        }

        function createFileItem(name, url, isCloud) {
            const ext = name.split('.').pop().toLowerCase();
            const div = document.createElement('div');
            div.className = 'file-item';
            div.dataset.fileName = name; // Store filename for deletion
            
            let itemContent = `<i class="${getIcon(ext)}"></i> <span>${name}</span>`;
            if (!isCloud) {
                itemContent += `<button class="delete-local-file-btn" title="Delete from local storage"><i class="fas fa-times-circle"></i></button>`;
            }
            div.innerHTML = itemContent;

            div.onclick = (event) => {
                // Prevent opening file if delete button was clicked
                if (event.target.closest('.delete-local-file-btn')) {
                    deleteLocalFile(name);
                    return;
                }
                if (currentActiveFileItem) currentActiveFileItem.classList.remove('active');
                div.classList.add('active');
                currentActiveFileItem = div;
                openFile(url, name, ext, isCloud);
                if (window.innerWidth <= 768) toggleSidebar(false);
            };
            return div;
        }

        function handleFileUpload(event) {
            const files = event.target.files;
            let localData = JSON.parse(localStorage.getItem('local_files') || '[]');
            
            // Convert FileList to Array and filter out duplicates
            const newFiles = Array.from(files).filter(file => !localData.some(existingFile => existingFile.name === file.name));

            if (newFiles.length === 0 && files.length > 0) {
                alert("One or more selected files already exist in 'My Uploads'.");
                return;
            }

            let filesProcessed = 0;
            const totalFiles = newFiles.length;

            if (totalFiles === 0) return;

            // Show a temporary loading indicator or progress
            const uploadBtn = document.querySelector('.upload-btn');
            const originalBtnText = uploadBtn.innerHTML;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            uploadBtn.disabled = true;

            newFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localData.push({ name: file.name, data: e.target.result, type: file.type, lastRead: Date.now() });
                    filesProcessed++;

                    if (filesProcessed === totalFiles) {
                        localStorage.setItem('local_files', JSON.stringify(localData));
                        loadLocalLibrary();
                        uploadBtn.innerHTML = originalBtnText;
                        uploadBtn.disabled = false;
                        document.getElementById('file-input').value = ''; // Clear file input
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function loadLocalLibrary() {
            const container = document.getElementById('file-list-local');
            container.innerHTML = '';
            let localFiles = JSON.parse(localStorage.getItem('local_files') || '[]');
            
            if (localFiles.length === 0) {
                container.innerHTML = "<p style='padding:10px; text-align:center; color:#64748b;'>No local files uploaded yet.</p>";
            } else {
                // Sort local files by lastRead date (newest first)
                localFiles.sort((a, b) => b.lastRead - a.lastRead);
                localFiles.forEach(file => {
                    container.appendChild(createFileItem(file.name, file.data, false));
                });
            }
            addLocalLibraryControls(container, localFiles.length > 0);
        }

        function addLocalLibraryControls(container, hasFiles) {
            let controlsDiv = container.querySelector('.local-controls');
            if (!controlsDiv) {
                controlsDiv = document.createElement('div');
                controlsDiv.className = 'local-controls';
                controlsDiv.style.padding = '10px';
                controlsDiv.style.borderTop = '1px solid var(--border-color)';
                controlsDiv.style.marginTop = '10px';
                controlsDiv.style.display = 'flex';
                controlsDiv.style.justifyContent = 'center';
                container.appendChild(controlsDiv);
            }
            controlsDiv.innerHTML = ''; // Clear previous controls
            
            if (hasFiles) {
                const clearAllBtn = document.createElement('button');
                clearAllBtn.className = 'clear-all-local-btn';
                clearAllBtn.innerHTML = '<i class="fas fa-trash-alt"></i> Clear All My Uploads';
                clearAllBtn.onclick = clearAllLocalFiles;
                controlsDiv.appendChild(clearAllBtn);
            }
        }

        function deleteLocalFile(fileName) {
            if (!confirm(`Are you sure you want to delete "${fileName}" from your local uploads?`)) {
                return;
            }

            let localData = JSON.parse(localStorage.getItem('local_files') || '[]');
            const updatedLocalData = localData.filter(file => file.name !== fileName);
            localStorage.setItem('local_files', JSON.stringify(updatedLocalData));
            
            loadLocalLibrary(); // Reload the list
            
            // If the deleted file was currently open, clear the viewer
            if (currentFilePath === fileName) {
                viewerContent.innerHTML = `<div class="unsupported">
                    <i class="fas fa-file-import fa-5x" style="color: #cbd5e1; margin-bottom: 20px;"></i>
                    <h2>Welcome to sOuLREADER</h2>
                    <p>Select a file from the repository or upload one from your device.</p>
                </div>`;
                fileTitle.innerText = "Select a document to begin";
                currentFilePath = "";
                if (currentActiveFileItem) currentActiveFileItem.classList.remove('active');
                currentActiveFileItem = null;
            }
        }

        function clearAllLocalFiles() {
            if (!confirm('Are you sure you want to delete ALL your uploaded files? This action cannot be undone.')) {
                return;
            }
            localStorage.removeItem('local_files');
            // Also clear all progress for local files
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('progress_')) {
                    localStorage.removeItem(key);
                }
            }

            loadLocalLibrary(); // Reload the list, which will show empty message
            
            // Clear the viewer if any local file was open
            viewerContent.innerHTML = `<div class="unsupported">
                <i class="fas fa-file-import fa-5x" style="color: #cbd5e1; margin-bottom: 20px;"></i>
                <h2>Welcome to sOuLREADER</h2>
                <p>Select a file from the repository or upload one from your device.</p>
            </div>`;
            fileTitle.innerText = "Select a document to begin";
            currentFilePath = "";
            if (currentActiveFileItem) currentActiveFileItem.classList.remove('active');
            currentActiveFileItem = null;
        }

        function openFile(url, name, ext, isCloud) {
            currentFilePath = name;
            fileTitle.innerText = name;
            viewerContent.innerHTML = '';
            document.getElementById('loader').classList.add('show');

            const textExts = ['txt', 'rtf', 'csv', 'tsv', 'tex', 'msg', 'json', 'xml', 'yaml', 'yml', 'sql', 'ini', 'conf', 'env'];
            const codeExts = ['html', 'htm', 'css', 'scss', 'js', 'jsx', 'ts', 'tsx', 'php', 'asp', 'c', 'cpp', 'h', 'hpp', 'java', 'py', 'rb', 'go', 'rs', 'swift', 'kt', 'sh', 'bat', 'cmd', 'com']; 
            const imgExts = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'tiff', 'webp', 'heic', 'ico'];
            const vectorExts = ['svg', 'ai', 'eps'];
            const videoExts = ['mp4', 'mkv', 'avi', 'mov', 'wmv', 'flv', 'webm', 'm4v', '3gp', 'mpeg', 'mpg'];
            const audioExts = ['mp3', 'aac', 'ogg', 'm4a', 'wma', 'opus', 'wav', 'flac', 'alac', 'aiff'];
            const officeExts = ['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'ods', 'odt', 'odp', 'wpd', 'pages', 'numbers', 'xlsm', 'key', 'pps', 'ppsx'];
            const ebookExts = ['epub', 'mobi', 'azw3'];

            setTimeout(async () => {
                try {
                    if (ext === 'pdf') {
                        viewerContent.innerHTML = `<iframe src="${url}" width="100%" height="100%"></iframe>`;
                    } 
                    else if (ext === 'md') {
                        const resp = await (isCloud ? fetch(url) : Promise.resolve({text: () => Promise.resolve(atob(url.split(',')[1]))}));
                        viewerContent.innerHTML = `<div class="content-text-wrapper">${marked.parse(await resp.text())}</div>`;
                    }
                    else if (imgExts.includes(ext) || ext === 'svg') {
                        viewerContent.innerHTML = `<div class="img-wrapper"><img src="${url}"></div>`;
                    }
                    else if (videoExts.includes(ext)) {
                        viewerContent.innerHTML = `<div class="media-wrapper"><video controls autoplay style="max-width:100%"><source src="${url}"></video></div>`;
                    }
                    else if (audioExts.includes(ext)) {
                        viewerContent.innerHTML = `<div class="media-wrapper"><i class="fas fa-music fa-4x"></i><br><audio controls autoplay><source src="${url}"></audio></div>`;
                    }
                    else if (ext === 'epub') {
                        viewerContent.innerHTML = `<div id="epub-viewer" style="height:100%"></div>`;
                        ePub(url).renderTo("epub-viewer", { width: "100%", height: "100%" }).display();
                    }
                    else if (textExts.includes(ext) || codeExts.includes(ext)) {
                        const resp = await (isCloud ? fetch(url) : Promise.resolve({text: () => Promise.resolve(atob(url.split(',')[1]))}));
                        const txt = (await resp.text()).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        viewerContent.innerHTML = `<pre class="code-wrapper"><code class="language-${ext}">${txt}</code></pre>`;
                        Prism.highlightAllUnder(viewerContent);
                    }
                    else if (officeExts.includes(ext) && isCloud) {
                        viewerContent.innerHTML = `<iframe src="https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true" width="100%" height="100%"></iframe>`;
                    }
                    else {
                        throw new Error(`File type .${ext} viewing not supported directly.`);
                    }
                    viewerContent.scrollTop = localStorage.getItem(`progress_${name}`) || 0;
                } catch (err) {
                    viewerContent.innerHTML = `<div class="unsupported"><i class="fas fa-exclamation-triangle fa-5x" style="color:#ef4444;margin-bottom:20px"></i><h3>Unsupported or Error</h3><p>${err.message}</p><br><a href="${url}" download>Download File</a></div>`;
                }
                document.getElementById('loader').classList.remove('show');
            }, 100);
        }

        function getIcon(ext) {
            const icons = { pdf:'pdf', doc:'word', docx:'word', xls:'excel', xlsx:'excel', ppt:'powerpoint', pptx:'powerpoint', epub:'book', mp3:'audio', mp4:'video', zip:'archive', js:'code', py:'code' };
            return `fas fa-file-${icons[ext] || 'alt'}`;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase().includes(tab)));
            document.getElementById('file-list-cloud').style.display = tab === 'cloud' ? 'block' : 'none';
            document.getElementById('file-list-local').style.display = tab === 'local' ? 'block' : 'none';
        }

        function toggleSidebar(show) {
            document.getElementById('sidebar').classList.toggle('hidden', !show);
        }

        function setupSidebarToggles() {
            document.getElementById('sidebar-toggle-btn').onclick = () => toggleSidebar(true);
            document.getElementById('close-sidebar-btn').onclick = () => toggleSidebar(false);
            if (window.innerWidth <= 768) toggleSidebar(false);
        }

        function saveProgress(name, pos) { localStorage.setItem(`progress_${name}`, pos); }
    </script>
</body>
</html>
